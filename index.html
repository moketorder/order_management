        // 미입금자 상세 리스트 모달 표시
        function showUnpaidListModal() {
            // 현재 선택된 일자 탭 데이터를 기본으로 가져옴
            const targetOrders = rawOrders.filter(item => {
                const info = getOrderDateInfo(item);
                const itemYear = info.dateStr && info.dateStr !== "기타" ? (info.dateStr.split('-')[0] + "년") : "기타";
                
                if (currentDay) {
                    return itemYear === currentYear && info.month === currentMonth && info.day === currentDay;
                } else {
                    return itemYear === currentYear && info.month === currentMonth;
                }
            });

            const dateTitle = `${currentYear || ''} ${currentMonth || ''} ${currentDay || ''}`.trim() || '전체';
            const nonCanceledOrders = targetOrders.filter(it => {
                const isCanceled = (it.canceled === true || it.canceled === "true");
                if (isCanceled) return false;
                const actualShippingMethod = (it.shippingMethod === '배달주문' || (it.shippingMethod !== '매장픽업' && it.address && it.address.trim() !== "")) ? '배달주문' : '매장픽업';
                return actualShippingMethod !== '매장픽업';
            });
            
            // 고객별 그룹화
            const customerGroups = {};
            nonCanceledOrders.forEach(it => {
                const key = `${it.name || "무명"}_${it.phone || "번호없음"}`;
                if (!customerGroups[key]) {
                    customerGroups[key] = [];
                }
                customerGroups[key].push(it);
            });

            const unpaidList = [];
            Object.entries(customerGroups).forEach(([key, items]) => {
                const hasUnpaid = items.some(it => {
                    const isPaid = (it.paid === true || it.paid === "true");
                    const isCompleted = (it.status === '배달완료' || it.status === '픽업');
                    return !isPaid && !isCompleted;
                });

                if (hasUnpaid) {
                    const firstItem = items[0];
                    const customerName = firstItem.name || "이름 없음";
                    const customerPhone = firstItem.phone || "";
                    
                    // 미입금 상품 정보 요약 (배달완료/픽업완료 및 입금완료 제외)
                    const unpaidItemsSummary = items
                        .filter(it => {
                            const isPaid = (it.paid === true || it.paid === "true");
                            const isCompleted = (it.status === '배달완료' || it.status === '픽업');
                            return !isPaid && !isCompleted;
                        })
                        .map(it => `${it.item}(${it.qty}개)`)
                        .join(", ");
                        
                    // 미입금 고객의 미완료 미입금 품목 합계금액
                    const totalAmount = items
                        .filter(it => {
                            const isPaid = (it.paid === true || it.paid === "true");
                            const isCompleted = (it.status === '배달완료' || it.status === '픽업');
                            return !isPaid && !isCompleted;
                        })
                        .reduce((sum, it) => sum + parseInt(it.total || 0), 0);

                    unpaidList.push({
                        name: customerName,
                        phone: customerPhone,
                        amount: totalAmount,
                        items: unpaidItemsSummary,
                        kakaoName: firstItem.kakaoName || "",
                        kakaoRealName: firstItem.kakaoRealName || ""
                    });
                }
            });

            // 모달 생성
            const modalId = 'unpaid-detail-modal';
            let oldModal = document.getElementById(modalId);
            if (oldModal) oldModal.remove();

            const modal = document.createElement('div');
            modal.id = modalId;
            modal.className = 'unpaid-modal-overlay';

            // 데스크톱 테이블 및 모바일 카드 렌더링
            let desktopRows = '';
            let mobileCards = '';

            if (unpaidList.length === 0) {
                desktopRows = `<tr><td colspan="3" style="text-align:center; padding:30px; color:var(--text-sub);">미입금 고객이 없습니다.</td></tr>`;
                mobileCards = `<div style="text-align:center; padding:30px; color:var(--text-sub); font-size:13px;">미입금 고객이 없습니다.</div>`;
            } else {
                unpaidList.forEach(user => {
                    desktopRows += `
                        <tr>
                            <td>
                                <div class="unpaid-table-name">${user.name}${user.kakaoName ? ` <span class="kakao-badge">💬 ${user.kakaoName}${user.kakaoRealName ? ` (${user.kakaoRealName})` : ''}</span>` : ''}</div>
                                <div class="unpaid-table-phone"><a href="tel:${user.phone}" class="unpaid-phone-link blurred" onclick="revealPhone(event, this)">📞 ${user.phone}</a></div>
                            </td>
                            <td class="unpaid-table-items">${user.items}</td>
                            <td class="unpaid-table-amount">${user.amount.toLocaleString()}원</td>
                        </tr>
                    `;

                    mobileCards += `
                        <div class="unpaid-mobile-card">
                            <div class="unpaid-card-row">
                                <span class="unpaid-card-name">${user.name}${user.kakaoName ? ` <span class="kakao-badge">💬 ${user.kakaoName}${user.kakaoRealName ? ` (${user.kakaoRealName})` : ''}</span>` : ''}</span>
                                <span class="unpaid-card-amount">${user.amount.toLocaleString()}원</span>
                            </div>
                            <div class="unpaid-card-row">
                                <span class="unpaid-card-phone"><a href="tel:${user.phone}" class="unpaid-phone-link blurred" onclick="revealPhone(event, this)">📞 ${user.phone}</a></span>
                            </div>
                            <div class="unpaid-card-items">
                                📦 ${user.items}
                            </div>
                        </div>
                    `;
                });
            }

            modal.innerHTML = `
                <div class="unpaid-modal-content">
                    <div class="unpaid-modal-header">
                        <h2>🔴 ${dateTitle} 미입금 상세 내역</h2>
                        <button class="unpaid-modal-close" onclick="closeUnpaidModal()">&times;</button>
                    </div>
                    <div class="unpaid-modal-body">
                        <!-- 데스크톱 테이블 뷰 -->
                        <div class="unpaid-table-wrapper">
                            <table class="unpaid-table">
                                <thead>
                                    <tr>
                                        <th style="width: 150px;">고객 정보</th>
                                        <th>미입금 품목</th>
                                        <th style="width: 120px; text-align: right;">미입금액</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    ${desktopRows}
                                </tbody>
                            </table>
                        </div>

                        <!-- 모바일 카드 뷰 -->
                        <div class="unpaid-mobile-card-list">
                            ${mobileCards}
                        </div>
                    </div>
                    <div class="unpaid-modal-footer">
                        <button class="btn-modal-close" onclick="closeUnpaidModal()">닫기</button>
                    </div>
                </div>
            `;

            document.body.appendChild(modal);
            setTimeout(() => modal.classList.add('active'), 10);
        }

        function closeUnpaidModal() {
            const modal = document.getElementById('unpaid-detail-modal');
            if (modal) {
                modal.classList.remove('active');
                setTimeout(() => modal.remove(), 300);
            }
        }

        function revealPhone(event, element) {
            if (element.classList.contains('blurred')) {
                event.preventDefault(); // First click: prevent call and unblur
                element.classList.remove('blurred');
            }
        }

        function closeSummaryModal() {
            const modal = document.getElementById('summary-modal');
            if (modal) {
                modal.classList.remove('active');
                setTimeout(() => modal.remove(), 300);
            }
        }

        // 6. CSV 내보내기 헬퍼 (일별 / 월별 선택)
        function exportToCSV(type = 'day') {
            let filtered = [];
            
            if (type === 'month') {
                filtered = rawOrders.filter(item => {
                    const info = getOrderDateInfo(item);
                    const itemYear = info.dateStr && info.dateStr !== "기타" ? (info.dateStr.split('-')[0] + "년") : "기타";
                    return itemYear === currentYear && info.month === currentMonth;
                });
            } else {
                filtered = rawOrders.filter(item => {
                    const info = getOrderDateInfo(item);
                    const itemYear = info.dateStr && info.dateStr !== "기타" ? (info.dateStr.split('-')[0] + "년") : "기타";
                    return itemYear === currentYear && info.month === currentMonth && info.day === currentDay;
                });
            }

            if (filtered.length === 0) {
                showToast("출력할 내역이 없습니다.");
                return;
            }

            let yearStr = "";
            const firstInfo = getOrderDateInfo(filtered[0]);
            if (firstInfo.dateStr && firstInfo.dateStr !== "기타") {
                yearStr = firstInfo.dateStr.split('-')[0] + "년_";
            } else {
                yearStr = new Date().getFullYear() + "년_";
            }

            const fileName = type === 'month' 
                ? `moket_orders_${yearStr}${currentMonth}.csv`
                : `moket_orders_${yearStr}${currentMonth}_${currentDay}.csv`;

            let csvContent = "\ufeff"; // 한글 깨짐 방지 BOM
            // 헤더 정의
            const headers = [
                "주문일시", "주문자명", "연락처", "카톡닉네임", "카톡실명", "카톡연락처", 
                "연령대", "성별", "수령방법", "배달주소", "상세주소", "공동현관키", 
                "상품명", "단가", "수량", "총금액", "픽업예정일", 
                "현금영수증발행", "현금영수증구분", "현금영수증연락처", 
                "상태", "입고여부", "수령여부(픽업)", "배달완료", "취소여부", "현장판매"
            ];
            csvContent += headers.join(",") + "\n";

            filtered.forEach(it => {
                const row = [
                    it.timestamp || "",
                    it.name || "",
                    it.phone || "",
                    it.kakaoName || "",
                    it.kakaoRealName || "",
                    it.kakaoPhone || "",
                    it.ageGroup || "",
                    it.gender || "",
                    it.shippingMethod || "",
                    (it.address || "").replace(/"/g, '""').replace(/,/g, ' '),
                    (it.addressDetail || "").replace(/"/g, '""').replace(/,/g, ' '),
                    (it.entrance || "").replace(/"/g, '""').replace(/,/g, ' '),
                    (it.item || "").replace(/"/g, '""').replace(/,/g, ' '),
                    it.price || 0,
                    it.qty || 0,
                    it.total || 0,
                    it.pickupDate || "",
                    it.cashReceipt || "미발행",
                    it.cashReceiptType || "",
                    it.cashReceiptPhone || "",
                    it.status || "대기",
                    it.isStocked ? "O" : "X",
                    it.received ? "O" : "X",
                    it.delivered ? "O" : "X",
                    it.canceled ? "O" : "X",
                    it.onSite ? "O" : "X"
                ];
                
                // 각 항목의 값들을 큰따옴표로 감싸서 CSV 형식에 맞춤
                const formattedRow = row.map(val => `"${String(val).replace(/"/g, '""')}"`);
                csvContent += formattedRow.join(",") + "\n";
            });

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            
            link.setAttribute("href", url);
            link.setAttribute("download", fileName);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // 6.5 선택된 주문 카드 인쇄 헬퍼
        function printSelectedCards() {
            if (selectedItems.size === 0) {
                showToast("선택된 주문 항목이 없습니다.");
                return;
            }

            // 1. 선택된 항목들을 고객별로 그룹화
            const grouped = {};
            rawOrders.forEach(item => {
                const key = item.phone + "|" + item.orderKey;
                if (selectedItems.has(key)) {
                    const isCanceled = (item.canceled === true || item.canceled === "true" || String(item.canceled).toUpperCase() === "TRUE");
                    if (isCanceled) return; // 취소된 상품은 인쇄 대상에서 제외

                    const actualShippingMethod = (item.shippingMethod === '배달주문' || (item.shippingMethod !== '매장픽업' && item.address && item.address.trim() !== "")) ? '배달주문' : '매장픽업';
                    const customerKey = `${item.name}_${item.phone}_${actualShippingMethod}`;
                    if (!grouped[customerKey]) {
                        grouped[customerKey] = {
                            name: item.name,
                            phone: item.phone,
                            shippingMethod: actualShippingMethod,
                            address: item.address || "",
                            addressDetail: item.addressDetail || "",
                            entrance: item.entrance || "",
                            kakaoName: item.kakaoName || "",
                            kakaoRealName: item.kakaoRealName || "",
                            totalPrice: 0,
                            items: []
                        };
                    }
                    grouped[customerKey].items.push(item);
                    grouped[customerKey].totalPrice += parseInt(item.total || 0);
                }
            });

            // 2. 프린트용 HTML 빌드
            let printHtml = `
                <!DOCTYPE html>
                <html>
                <head>
                    <meta charset="utf-8">
                    <title>주문 영수증 인쇄</title>
                    <style>
                        @page {
                            size: 80mm auto;
                            margin: 0;
                        }
                        body {
                            font-family: 'Pretendard', -apple-system, sans-serif;
                            background: white;
                            color: black;
                            width: 72mm;
                            margin: 0 auto;
                            padding: 4mm 2mm;
                            box-sizing: border-box;
                        }
                        .print-card {
                            page-break-after: always;
                            page-break-inside: avoid;
                            border: none;
                            padding: 0 0 10mm 0;
                            margin: 0;
                        }
                        .print-card:last-child {
                            page-break-after: avoid;
                        }
                        .card-header {
                            border-bottom: 1px dashed #333;
                            padding-bottom: 6px;
                            margin-bottom: 8px;
                            display: flex;
                            flex-direction: column;
                            align-items: flex-start;
                        }
                        .customer-info {
                            width: 100%;
                        }
                        .customer-info h2 {
                            margin: 0 0 4px 0;
                            font-size: 17px;
                            font-weight: 800;
                        }
                        .customer-info p {
                            margin: 2px 0;
                            font-size: 13px;
                        }
                        .shipping-type {
                            font-weight: bold;
                            font-size: 13px;
                            margin-bottom: 4px;
                        }
                        .shipping-delivery {
                            color: #0d47a1 !important;
                        }
                        .shipping-pickup {
                            color: #1b5e20 !important;
                        }
                        .address-box {
                            background: #f5f5f5 !important;
                            -webkit-print-color-adjust: exact;
                            print-color-adjust: exact;
                            padding: 6px;
                            border-radius: 4px;
                            margin-top: 6px;
                            font-size: 13px;
                            border: 1px dashed #bbb;
                            width: 100%;
                            box-sizing: border-box;
                        }
                        table {
                            width: 100%;
                            border-collapse: collapse;
                            margin-top: 6px;
                        }
                        th, td {
                            border-bottom: 1px dashed #ddd;
                            padding: 6px 2px;
                            text-align: left;
                            font-size: 13px;
                            word-break: break-all;
                        }
                        th {
                            background: #f0f0f0 !important;
                            -webkit-print-color-adjust: exact;
                            print-color-adjust: exact;
                            font-weight: bold;
                        }
                        .text-right {
                            text-align: right;
                        }
                        .card-footer {
                            margin-top: 8px;
                            border-top: 1px dashed #333;
                            padding-top: 6px;
                            text-align: right;
                            font-size: 15px;
                            font-weight: bold;
                        }
                    </style>
                </head>
                <body>
            `;

            Object.values(grouped).forEach(customer => {
                const isDelivery = customer.shippingMethod === '배달주문';
                const badgeClass = isDelivery ? 'shipping-delivery' : 'shipping-pickup';
                
                const cleanPhone = customer.phone.replace(/\D/g, "");
                const displayPhone = cleanPhone.slice(-4);
                const displayMethod = customer.shippingMethod === '매장픽업' ? '픽업주문' : customer.shippingMethod;
                
                printHtml += `
                    <div class="print-card">
                        <div class="card-header">
                            <div class="customer-info">
                                <div class="shipping-type ${badgeClass}">[${displayMethod}]</div>
                                <h2>${customer.name} (☎ ${displayPhone})</h2>
                                ${isDelivery ? `
                                    <div class="address-box">
                                        <strong>배송지:</strong> ${customer.address} ${customer.addressDetail}<br>
                                        <strong>공동현관키:</strong> ${customer.entrance || '없음'}
                                    </div>
                                ` : ''}
                            </div>
                        </div>
                        <table>
                            <thead>
                                <tr>
                                    <th>상품명</th>
                                    <th class="text-right" style="width: 35px;">수량</th>
                                    <th class="text-right" style="width: 75px;">금액</th>
                                </tr>
                            </thead>
                            <tbody>
                `;

                customer.items.forEach(it => {
                    printHtml += `
                        <tr>
                            <td>${it.item}</td>
                            <td class="text-right">${it.qty}</td>
                            <td class="text-right">${parseInt(it.total || 0).toLocaleString()}원</td>
                        </tr>
                    `;
                });

                printHtml += `
                            </tbody>
                        </table>
                        <div class="card-footer">
                            합계금액: ${customer.totalPrice.toLocaleString()}원
                        </div>
                    </div>
                `;
            });

            printHtml += `
                </body>
                </html>
            `;

            const printWindow = window.open("", "_blank");
            printWindow.document.write(printHtml);
            printWindow.document.close();
            printWindow.focus();
            
            setTimeout(() => {
                printWindow.print();
                printWindow.close();
            }, 300);
        }

        // 7. 유틸리티 UI 컴포넌트 (로더, 토스트)
        function showLoader(text = "처리 중...") {
            document.getElementById('loader-text').innerText = text;
            document.getElementById('loader').style.display = 'flex';
        }

        function hideLoader() {
            document.getElementById('loader').style.display = 'none';
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // 초기 시작
        window.onload = fetchOrders;
    </script>
</body>

</html>
